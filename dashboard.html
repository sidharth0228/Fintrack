<!DOCTYPE html>
<html lang="en">

<head>
    <script>
        (function() {
            if (localStorage.getItem('dark-mode') === 'enabled') {
                document.documentElement.classList.add('dark-mode');
            }
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - FinTrack</title>
    <link rel="stylesheet" href="style.css">

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            const themeToggle = document.getElementById('theme-toggle');
            if (themeToggle) {
                const updateIcon = (isDark) => {
                    themeToggle.innerHTML = isDark 
                        ? `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>`
                        : `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>`;
                };

                updateIcon(document.documentElement.classList.contains('dark-mode'));

                themeToggle.addEventListener('click', () => {
                    document.documentElement.classList.toggle('dark-mode');
                    const isDark = document.documentElement.classList.contains('dark-mode');
                    localStorage.setItem('dark-mode', isDark ? 'enabled' : 'disabled');
                    updateIcon(isDark);
                });
            }

            // Sync User Info
            const user = JSON.parse(localStorage.getItem('user'));
            if (user) {
                const welcomeText = document.querySelector('.welcome-back-text');
                if (welcomeText) welcomeText.innerText = `Welcome back, ${user.name.split(' ')[0]}!`;
                
                const avatar = document.querySelector('.avatar');
                if (avatar) avatar.innerText = user.name.split(' ').map(n => n[0]).join('').toUpperCase();
            }

            fetchDashboardData();

            // Handle Logout
            document.querySelectorAll('a').forEach(link => {
                if (link.innerText.includes('Log Out')) {
                    link.addEventListener('click', (e) => {
                        e.preventDefault();
                        localStorage.removeItem('token');
                        localStorage.removeItem('user');
                        window.location.href = 'login.html';
                    });
                }
            });
        });

        async function fetchDashboardData() {
            try {
                const token = localStorage.getItem('token');
                if (!token) return;

                // 1. Get Expenses
                let expenses = [];
                try {
                    const expRes = await fetch('/api/expenses', { headers: { 'Authorization': `Bearer ${token}` } });
                    if (expRes.ok) {
                        const rawExpenses = await expRes.json();
                        // Map _id to id for consistency if needed, but we can just use the returned array
                        expenses = rawExpenses.map(e => ({...e, id: e._id || e.id}));
                        localStorage.setItem('localExpenses', JSON.stringify(expenses));
                    } else {
                        expenses = JSON.parse(localStorage.getItem('localExpenses') || '[]');
                    }
                } catch (e) {
                    console.error('API Error fetching expenses, using local cache', e);
                    expenses = JSON.parse(localStorage.getItem('localExpenses') || '[]');
                }
                
                // 2. Fetch Latest Income/Profile and Debts from Server
                let baseMonthlyIncome = parseFloat(localStorage.getItem('userMonthlyIncome') || 100000);
                let totalDebtEmi = 0;
                let totalCardDue = 0;

                try {
                    const [profileRes, loansRes] = await Promise.all([
                        fetch('/api/user/profile', { headers: { 'Authorization': `Bearer ${token}` } }),
                        fetch('/api/loans', { headers: { 'Authorization': `Bearer ${token}` } })
                    ]);

                    if (profileRes.ok) {
                        const userData = await profileRes.json();
                        baseMonthlyIncome = userData.baseExpectedIncome || 100000;
                        localStorage.setItem('userMonthlyIncome', baseMonthlyIncome);
                    }

                    if (loansRes.ok) {
                        const debtData = await loansRes.json();
                        // Only count active loans (backend already filters, but being safe)
                        totalDebtEmi = debtData.loans.reduce((sum, l) => sum + l.monthlyEMI, 0);
                        totalCardDue = debtData.cards.reduce((sum, c) => sum + c.totalDue, 0);
                    }
                } catch (err) {
                    console.error('❌ Server fetch error:', err);
                }

                // 3. Calculate Metrics
                const now = new Date();
                const currentMonth = now.getMonth();
                const currentYear = now.getFullYear();

                const manualExpenses = expenses.filter(e => {
                    const d = new Date(e.date);
                    return d.getMonth() === currentMonth && d.getFullYear() === currentYear;
                }).reduce((sum, item) => sum + item.amount, 0);

                // Disposable Income = Base Income - EMI (Fixed obligations)
                const disposableIncome = baseMonthlyIncome - totalDebtEmi;
                
                // Total Expenses = Manual Spends + Credit Card Dues
                const variableExpenses = manualExpenses + totalCardDue;
                
                // Balance = Disposable Income - variable expenses
                const totalBalance = disposableIncome - variableExpenses; 
                const monthlySavings = totalBalance;

                // 4. Update UI Metrics
                const balanceEl = document.getElementById('display-balance');
                if (balanceEl) balanceEl.innerText = `₹${totalBalance.toLocaleString('en-IN', { minimumFractionDigits: 2 })}`;
                
                const incomeSpan = document.getElementById('display-monthly-income');
                if (incomeSpan) {
                    incomeSpan.innerText = disposableIncome.toLocaleString('en-IN', { minimumFractionDigits: 2 });
                    // Optional: Update title if EMIs exist
                    const label = incomeSpan.closest('.card').querySelector('.text-sm');
                    if (label) label.innerText = totalDebtEmi > 0 ? 'Disposable Income' : 'Monthly Income';
                }

                const expensesEl = document.getElementById('display-expenses');
                if (expensesEl) expensesEl.innerText = `₹${variableExpenses.toLocaleString('en-IN', { minimumFractionDigits: 2 })}`;
                
                const savingsEl = document.getElementById('display-savings');
                if (savingsEl) savingsEl.innerText = `₹${monthlySavings.toLocaleString('en-IN', { minimumFractionDigits: 2 })}`;

                // 5. Transactions
                const transList = document.getElementById('recent-transactions-list');
                if (transList) {
                    transList.innerHTML = '';
                    const sorted = expenses.sort((a,b) => new Date(b.date) - new Date(a.date)).slice(0, 5);
                    
                    if (sorted.length === 0) {
                        transList.innerHTML = '<div class="text-muted text-sm text-center py-4">No recent transactions</div>';
                    } else {
                        sorted.forEach(tx => {
                            transList.insertAdjacentHTML('beforeend', `
                                <div class="flex justify-between items-center pb-3" style="border-bottom: 1px solid var(--border-color);">
                                    <div class="flex items-center gap-2">
                                        <div style="width: 36px; height: 36px; border-radius: 50%; background: rgba(239, 68, 68, 0.1); display: flex; align-items: center; justify-content: center; color: var(--danger);">💸</div>
                                        <div>
                                            <div class="font-medium text-sm">${tx.title}</div>
                                            <div class="text-xs text-muted">${new Date(tx.date).toLocaleDateString('en-IN')}</div>
                                        </div>
                                    </div>
                                    <div class="font-semibold text-sm text-danger">-₹${tx.amount.toLocaleString('en-IN')}</div>
                                </div>
                            `);
                        });
                    }
                }

                renderChart(disposableIncome, expenses);

            } catch (err) {
                console.error('Dashboard error:', err);
            }
        }

        window.editMonthlyIncome = async function() {
            const displayEl = document.getElementById('display-monthly-income');
            if (!displayEl) return;
            
            const currentVal = localStorage.getItem('userMonthlyIncome') || 100000;
            const container = displayEl.parentElement;
            const originalHTML = container.innerHTML;
            
            container.innerHTML = `
                <div class="flex items-center gap-2" onclick="event.stopPropagation()">
                    <input type="number" id="income-input" class="form-control" value="${currentVal}" style="width: 130px; font-size: 1.1rem; font-weight: bold; padding: 4px;">
                    <button id="save-income-btn" class="btn btn-primary" style="padding: 4px 10px; font-size: 0.8rem;">Save</button>
                    <button id="cancel-income-btn" class="btn btn-ghost" style="padding: 4px;">✕</button>
                </div>
            `;
            
            const input = document.getElementById('income-input');
            const saveBtn = document.getElementById('save-income-btn');
            input.focus();
            input.select();
            
            saveBtn.onclick = async () => {
                const val = parseFloat(input.value);
                if (isNaN(val)) return;
                
                saveBtn.disabled = true;
                saveBtn.innerText = '...';
                
                try {
                    const res = await fetch('/api/user/income', {
                        method: 'PATCH',
                        headers: {
                            'Authorization': `Bearer ${localStorage.getItem('token')}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ income: val })
                    });
                    
                    if (res.ok) {
                        localStorage.setItem('userMonthlyIncome', val);
                        let userObj = JSON.parse(localStorage.getItem('user') || '{}');
                        userObj.baseExpectedIncome = val;
                        localStorage.setItem('user', JSON.stringify(userObj));
                        
                        container.innerHTML = originalHTML;
                        await fetchDashboardData();
                    } else {
                        const data = await res.json();
                        alert('Error: ' + data.message);
                        container.innerHTML = originalHTML;
                    }
                } catch (e) {
                    alert('Network error while saving');
                    container.innerHTML = originalHTML;
                }
            };
            
            document.getElementById('cancel-income-btn').onclick = () => container.innerHTML = originalHTML;
        };

        function renderChart(income, expenses) {
            const chartContainer = document.querySelector('.chart-bar-container');
            if (!chartContainer) return;
            chartContainer.innerHTML = '<canvas id="dashboardChart" style="width: 100%; height: 250px;"></canvas>';

            if (typeof Chart === 'undefined') {
                const script = document.createElement('script');
                script.src = 'https://cdn.jsdelivr.net/npm/chart.js';
                script.onload = () => initChart(income, expenses);
                document.head.appendChild(script);
            } else {
                initChart(income, expenses);
            }
        }

        function initChart(income, expenses) {
            const ctx = document.getElementById('dashboardChart').getContext('2d');
            
            const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            const now = new Date();
            
            const labels = [];
            const incData = [];
            const expData = [];
            const incVal = income > 0 ? income : 100000;
            
            // Generate data for the last 6 months (ending with the current month)
            for (let i = 5; i >= 0; i--) {
                const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
                labels.push(monthNames[d.getMonth()]);
                
                // Assume constant base income for the visual scale
                incData.push(incVal);
                
                // Aggregate actual expenses matching this month and year from the database
                const monthExpenses = expenses.filter(e => {
                    if (!e.date) return false;
                    const eDate = new Date(e.date);
                    return eDate.getMonth() === d.getMonth() && eDate.getFullYear() === d.getFullYear();
                }).reduce((sum, item) => sum + (item.amount || 0), 0);
                
                expData.push(monthExpenses);
            }
            
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Income',
                            data: incData,
                            backgroundColor: 'rgba(16, 185, 129, 0.8)', // Success green
                            borderRadius: 4
                        },
                        {
                            label: 'Expenditure',
                            data: expData,
                            backgroundColor: 'rgba(239, 68, 68, 0.8)', // Danger red
                            borderRadius: 4
                        }
                    ]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'top' }
                    }
                }
            });
        }
    </script>
</head>
